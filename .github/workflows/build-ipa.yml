name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "YachiyoApp/**"
      - "web-prototype/**"
      - "project.yml"
      - ".github/workflows/build-ipa.yml"

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml --project . --project-root .

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -project "YachiyoApp.xcodeproj" \
            -scheme YachiyoApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR=build/output \
            build

      - name: Package as IPA
        run: |
          APP_PATH=$(find build/output -name "*.app" | head -1)
          echo "App: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r YachiyoApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: YachiyoApp-ipa
          path: YachiyoApp.ipa
