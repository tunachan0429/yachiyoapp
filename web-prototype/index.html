<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yachiyoapp — UI Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="stage-wrap">
    <!-- iPhone frame -->
    <div class="phone">
      <div class="screen">

        <!-- Cosmic background -->
        <div class="bg-cosmos">
          <div class="stars" id="stars"></div>
          <div class="nebula"></div>
          <div class="moon"></div>
          <div class="vignette"></div>
        </div>

        <!-- Status bar -->
        <div class="statusbar">
          <div class="sb-left">
            <span class="sb-signal" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
            <span class="sb-carrier">mobile</span>
          </div>
          <div class="sb-right">
            <svg class="sb-wifi" viewBox="0 0 18 14" width="17" height="13"><path fill="currentColor" d="M9 11.5a1.6 1.6 0 1 0 0 3.2 1.6 1.6 0 0 0 0-3.2Zm0-4.1c1.6 0 3 .62 4.08 1.63l1.5-1.7A8.4 8.4 0 0 0 9 5.3 8.4 8.4 0 0 0 3.42 7.3l1.5 1.7A5.9 5.9 0 0 1 9 7.4Zm0-4.1c2.7 0 5.17 1.03 7.03 2.72l1.47-1.66A11.9 11.9 0 0 0 9 1.2 11.9 11.9 0 0 0 .5 4.16L1.97 5.8A9.4 9.4 0 0 1 9 3.3Z"/></svg>
            <span class="sb-pct">100%</span>
            <span class="sb-battery full"><i></i></span>
          </div>
        </div>

        <!-- Top bar: menu / conversation / capture -->
        <header class="topbar">
          <button class="hamburger" title="メニュー">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
          </button>

          <button class="conv-pill">
            <svg class="conv-ic" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-5 4V6a2 2 0 0 1 2-2Z"/></svg>
            <span class="conv-label">新しい会話</span>
            <svg class="conv-chevron" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="m7 10 5 5 5-5z"/></svg>
          </button>

          <button class="capture-btn">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M9 3 7.2 5H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 3H9Zm3 14a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9Z"/></svg>
            <span>CAPTURE</span>
          </button>
        </header>

        <!-- Character stage (Live2D モデルをここに配置) -->
        <div class="stage">
          <div class="character" id="character" aria-label="Live2Dモデル(プレースホルダー)">
            <!-- Umbrella -->
            <svg class="umbrella" viewBox="0 0 260 200" width="86%">
              <defs>
                <radialGradient id="umb" cx="50%" cy="80%" r="70%">
                  <stop offset="0%" stop-color="#c0343a"/>
                  <stop offset="70%" stop-color="#a5282e"/>
                  <stop offset="100%" stop-color="#7d1c22"/>
                </radialGradient>
              </defs>
              <path d="M130 20C60 20 8 70 4 120c40-16 84-16 126-16s86 0 126 16C252 70 200 20 130 20Z" fill="url(#umb)"/>
              <g stroke="#e7b96a" stroke-width="1.5" opacity=".7">
                <path d="M130 24v82M70 30 100 106M190 30 160 106M30 52 118 106M230 52 142 106"/>
              </g>
              <circle cx="130" cy="22" r="5" fill="#e7b96a"/>
            </svg>
            <!-- Character silhouette placeholder -->
            <svg class="figure" viewBox="0 0 300 520" preserveAspectRatio="xMidYMax meet" width="100%">
              <!-- back hair -->
              <path fill="#eef1f8" d="M150 70c-56 0-84 40-84 104 0 150 4 250 10 320h148c6-70 10-170 10-320 0-64-28-104-84-104Z"/>
              <!-- long twintails -->
              <path fill="#f5c7d6" d="M84 180c-24 90-26 220-14 300l22-2c-8-96-6-206 10-292Z"/>
              <path fill="#f5c7d6" d="M216 180c24 90 26 220 14 300l-22-2c8-96 6-206-10-292Z"/>
              <!-- face -->
              <ellipse cx="150" cy="150" rx="46" ry="52" fill="#fdeee6"/>
              <!-- buns -->
              <circle cx="118" cy="96" r="20" fill="#f4f6fb"/>
              <circle cx="182" cy="96" r="20" fill="#f4f6fb"/>
              <circle cx="118" cy="96" r="9" fill="#e6eaf3"/>
              <circle cx="182" cy="96" r="9" fill="#e6eaf3"/>
              <!-- front hair -->
              <path fill="#f4f6fb" d="M150 70c-46 0-74 32-78 78 16-10 26-14 40-14-4 10-2 20 4 26 8-16 18-24 30-26-2 8 0 16 6 22 6-14 14-22 24-24 10 6 16 14 18 24 4-6 6-14 4-24-4-42-30-62-72-62Z"/>
              <!-- eyes -->
              <ellipse cx="132" cy="150" rx="8" ry="12" fill="#8a6fd0"/>
              <ellipse cx="168" cy="150" rx="8" ry="12" fill="#8a6fd0"/>
              <circle cx="134" cy="146" r="2.6" fill="#fff"/>
              <circle cx="170" cy="146" r="2.6" fill="#fff"/>
              <path d="M144 172q6 5 12 0" stroke="#d98b8b" stroke-width="2.2" fill="none" stroke-linecap="round"/>
              <!-- kimono -->
              <path fill="#c0343a" d="M112 206c14 14 62 14 76 0l20 60c-38 22-98 22-136 0Z"/>
              <path fill="#2a2f4a" d="M108 250l42 20 42-20 30 120c-48 24-96 24-144 0Z"/>
              <path fill="#3fb6a8" d="M120 340l30 14 30-14 22 150c-34 16-70 16-104 0Z"/>
              <rect x="132" y="250" width="36" height="120" fill="#6b4a9e" opacity=".85"/>
            </svg>
            <span class="placeholder-tag">Live2D モデル配置エリア</span>
          </div>
        </div>

        <!-- Reply box (向こうからの返信 — 4つのツールボタンの上) -->
        <div class="reply-box" id="reply-box">
          <p class="reply-title" id="reply-title">話しかけてみよう！</p>
          <p class="reply-text" id="reply-text">最初のひとことを待ってるよ</p>
        </div>

        <!-- 4 tool buttons -->
        <nav class="toolbar">
          <button class="tool" data-label="設定">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19.14 12.94a7.5 7.5 0 0 0 .05-.94 7.5 7.5 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.24-1.12.55-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.66 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.03.31-.05.62-.05.94s.02.63.05.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.42.32.66.22l2.39-.96c.5.39 1.04.7 1.62.94l.36 2.54c.05.24.26.42.5.42h3.84c.24 0 .45-.18.5-.42l.36-2.54c.58-.24 1.12-.55 1.62-.94l2.39.96c.24.1.52.02.66-.22l1.92-3.32a.5.5 0 0 0-.12-.64ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/></svg>
          </button>
          <button class="tool" data-label="スタンプ">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm-3.5 7a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Zm7 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 17.5c-2.3 0-4.3-1.4-5.1-3.5h10.2c-.8 2.1-2.8 3.5-5.1 3.5Z"/></svg>
          </button>
          <button class="tool" data-label="読み上げ">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M4 9v6h4l5 5V4L8 9H4Zm11.5 3a3.5 3.5 0 0 0-2-3.15v6.3A3.5 3.5 0 0 0 15.5 12Zm-2-7.7v2.06a5.5 5.5 0 0 1 0 11.28v2.06a7.5 7.5 0 0 0 0-15.4Z"/></svg>
          </button>
          <button class="tool" data-label="音声入力" id="mic">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V22h2v-3.08A7 7 0 0 0 19 12Z"/></svg>
          </button>
        </nav>

        <!-- Chat input -->
        <div class="chat-input">
          <svg class="chat-ic" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-5 4V6a2 2 0 0 1 2-2Z"/></svg>
          <input id="chat-field" type="text" placeholder="何でも話してね" />
          <button class="send-btn" id="send-btn" title="送信">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 20 21 12 3 4v6l12 2-12 2z"/></svg>
          </button>
        </div>

        <!-- Footer disclaimer -->
        <p class="disclaimer">非公式ファンサイト / 公式・Netflix・権利者とは関係ありません</p>

      </div>
    </div>

    <p class="hint">中央はLive2Dモデルのプレースホルダーです（後で所有モデルに差し替え）。返信は4ボタンの上のボックスに出力されます。</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
