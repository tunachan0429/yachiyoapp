<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaguya AI — UI Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="stage-wrap">
    <!-- iPhone frame -->
    <div class="phone">
      <div class="screen">

        <!-- Cosmic background -->
        <div class="bg-cosmos">
          <div class="stars" id="stars"></div>
          <div class="nebula"></div>
          <div class="vignette"></div>
        </div>

        <!-- Status bar -->
        <div class="statusbar">
          <span class="sb-time">9:41</span>
          <div class="dynamic-island"></div>
          <div class="sb-right">
            <span class="sb-signal" aria-hidden="true">
              <i></i><i></i><i></i><i></i>
            </span>
            <svg class="sb-wifi" viewBox="0 0 18 14" width="17" height="13"><path fill="currentColor" d="M9 11.5a1.6 1.6 0 1 0 0 3.2 1.6 1.6 0 0 0 0-3.2Zm0-4.1c1.6 0 3 .62 4.08 1.63l1.5-1.7A8.4 8.4 0 0 0 9 5.3 8.4 8.4 0 0 0 3.42 7.3l1.5 1.7A5.9 5.9 0 0 1 9 7.4Zm0-4.1c2.7 0 5.17 1.03 7.03 2.72l1.47-1.66A11.9 11.9 0 0 0 9 1.2 11.9 11.9 0 0 0 .5 4.16L1.97 5.8A9.4 9.4 0 0 1 9 3.3Z"/></svg>
            <span class="sb-battery"><i></i></span>
          </div>
        </div>

        <!-- Top app bar -->
        <header class="appbar">
          <div class="live-tag">
            <span class="live-dot"></span> LIVE
          </div>
          <div class="char-name">
            <span class="name-jp">かぐや</span>
            <span class="name-sub">Kaguya</span>
          </div>
          <button class="icon-btn small" title="メニュー">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
          </button>
        </header>

        <!-- Moon logo -->
        <div class="moon-logo">
          <span class="moon moon-left"></span>
          <span class="moon moon-right"></span>
        </div>

        <!-- Character stage -->
        <div class="stage">
          <!-- Placeholder character (Live2D モデルはここに差し替え) -->
          <div class="character" id="character">
            <svg viewBox="0 0 300 460" width="100%" height="100%" preserveAspectRatio="xMidYMax meet" aria-label="キャラクター(プレースホルダー)">
              <!-- hair back -->
              <path fill="#e9edf6" d="M150 40c-70 0-108 52-108 140 0 120 8 210 8 260h200c0-50 8-140 8-260C266 92 220 40 150 40Z"/>
              <!-- face -->
              <ellipse cx="150" cy="150" rx="52" ry="58" fill="#fdeee6"/>
              <!-- eyes -->
              <ellipse cx="130" cy="152" rx="9" ry="13" fill="#7a5cc0"/>
              <ellipse cx="170" cy="152" rx="9" ry="13" fill="#7a5cc0"/>
              <circle cx="132" cy="148" r="3" fill="#fff"/>
              <circle cx="172" cy="148" r="3" fill="#fff"/>
              <!-- mouth -->
              <path d="M143 176q7 6 14 0" stroke="#d98b8b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
              <!-- hair front -->
              <path fill="#f4f6fb" d="M150 40c-58 0-92 40-98 96 22-8 30-20 44-22-6 14-4 26 2 34 8-24 20-36 34-40-2 12 2 22 10 28 4-20 12-32 24-36 8 10 10 22 8 34 10-8 16-18 18-30C288 96 214 40 150 40Z"/>
              <!-- ornaments -->
              <circle cx="96" cy="150" r="9" fill="#d94f5c"/>
              <circle cx="204" cy="150" r="9" fill="#d94f5c"/>
              <rect x="92" y="158" width="8" height="46" rx="4" fill="#e0b64f"/>
              <rect x="200" y="158" width="8" height="46" rx="4" fill="#e0b64f"/>
              <!-- collar / outfit -->
              <path fill="#fff" d="M108 214c14 18 70 18 84 0l30 40c-30 26-114 26-144 0Z"/>
              <path fill="#d94f5c" d="M126 228c16 10 32 10 48 0l6 18c-20 10-40 10-60 0Z"/>
              <path fill="#e7ebf4" d="M96 250l54 26 54-26 40 60c-52 30-136 30-188 0Z" opacity="0.9"/>
            </svg>
          </div>
        </div>

        <!-- Reaction bubbles -->
        <div class="reactions" id="reactions">
          <span class="rx" style="--c:#ff7bac">♥</span>
          <span class="rx" style="--c:#ffd166">★</span>
          <span class="rx" style="--c:#8ecae6">♪</span>
          <span class="rx" style="--c:#a0e8af">✿</span>
        </div>

        <!-- Dialogue / subtitle panel -->
        <div class="dialogue">
          <p id="dialogue-text"></p>
        </div>

        <!-- Bottom toolbar -->
        <nav class="toolbar">
          <button class="tool">
            <span class="tool-ic">
              <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M19.14 12.94a7.5 7.5 0 0 0 .05-.94 7.5 7.5 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.24-1.12.55-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.66 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.03.31-.05.62-.05.94s.02.63.05.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.42.32.66.22l2.39-.96c.5.39 1.04.7 1.62.94l.36 2.54c.05.24.26.42.5.42h3.84c.24 0 .45-.18.5-.42l.36-2.54c.58-.24 1.12-.55 1.62-.94l2.39.96c.24.1.52.02.66-.22l1.92-3.32a.5.5 0 0 0-.12-.64ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/></svg>
            </span>
            <span class="tool-label">設定</span>
          </button>

          <button class="tool">
            <span class="tool-ic">
              <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 5H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm-8 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-6.5A2.5 2.5 0 1 0 12 14a2.5 2.5 0 0 0 0-5Z"/></svg>
            </span>
            <span class="tool-label">カメラ</span>
          </button>

          <button class="tool mic">
            <span class="tool-ic">
              <svg viewBox="0 0 24 24" width="30" height="30"><path fill="currentColor" d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V22h2v-3.08A7 7 0 0 0 19 12Z"/></svg>
            </span>
          </button>

          <button class="tool">
            <span class="tool-ic">
              <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 4H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h4l4 4 4-4h4a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2ZM7 11a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/></svg>
            </span>
            <span class="tool-label">チャット</span>
          </button>

          <button class="tool">
            <span class="tool-ic">
              <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M4 4h6v6H4zm10 0h6v6h-6zM4 14h6v6H4zm10 0h6v6h-6z"/></svg>
            </span>
            <span class="tool-label">メニュー</span>
          </button>
        </nav>

      </div>
    </div>

    <p class="hint">プレースホルダーのキャラは後で所有Live2Dモデルに差し替えます。マイクボタンやチャットは仮動作します。</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
